# fly.toml app configuration file generated for afsnk-pay-server on 2026-03-10T17:06:04+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'afsnk-pay-server'
primary_region = 'lhr'

[build]
  dockerfile = './api.Dockerfile'

[env]
  PORT = '9999'

[http_service]
  internal_port = 9999
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
